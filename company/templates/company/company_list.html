<!DOCTYPE html>
<html>
<head>
    <title>Companies</title>
</head>
<body>
    <h1>Company List</h1>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Address</th>
            <th>Tax Number</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        {% for company in companies %}
        <tr>
            <td>{{ company.name }}</td>
            <td>{{ company.address }}</td>
            <td>{{ company.tax_number }}</td>
            <td>{{ company.email }}</td>
            <td>{{ company.phone }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No companies found.</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
